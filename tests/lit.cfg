import lit.formats
import os

tests_dir = os.path.dirname(__file__)
repo_root = os.path.abspath(os.path.join(tests_dir, '..'))
helpers_dir = os.path.join(repo_root, 'helpers')
output_prefix = lit_config.params.get('OUTPUT_PREFIX', '').strip()

config.name = 'Cheerp-testing-suite'
config.test_source_root = tests_dir
config.test_format = lit.formats.ShTest(execute_external=True)
config.suffixes = ['.cpp', '.c']

cheerp_targets = ('js', 'wasm', 'asmjs')

# A lit invocation pins exactly one (target, mode). Both are required.
target = lit_config.params.get('TARGET', '').strip().lower()
if target not in cheerp_targets:
    lit_config.fatal('TARGET is required and must be one of {} (got {!r})'.format(cheerp_targets, target))
mode = lit_config.params.get('MODE', '').strip().lower()
if mode not in ('regular', 'preexec'):
    lit_config.fatal('MODE is required and must be regular or preexec (got {!r})'.format(mode))
if mode == 'preexec' and target == 'wasm':
    lit_config.fatal('MODE=preexec is not supported for TARGET=wasm')

cheerp_flags = lit_config.params.get('CHEERP_FLAGS', '').strip()
opt_level = lit_config.params.get('OPT_LEVEL', 'O1').strip()

# Ensure opt_level has proper format (-O prefix)
if not opt_level.startswith('-'):
    if not opt_level.startswith('O'):
        opt_level = '-O' + opt_level
    else:
        opt_level = '-' + opt_level

# Compiler: defaults to /opt/cheerp/bin/clang++; override with --param COMPILER=<path>.
comp_base = os.path.expanduser(lit_config.params.get('COMPILER', '/opt/cheerp/bin/clang++').strip())

# Pull -valgrind/-asan out of CHEERP_FLAGS — they aren't compiler flags.
valgrind_mode = '-valgrind' in cheerp_flags
if valgrind_mode:
    cheerp_flags = cheerp_flags.replace('-valgrind', '').strip()

asan_mode = '-asan' in cheerp_flags
if asan_mode:
    cheerp_flags = cheerp_flags.replace('-asan', '').strip()

if asan_mode and target == 'js':
    lit_config.fatal('ASAN is not supported for TARGET=js')

lit_config.note('Target: {} / Mode: {}'.format(target, mode))
lit_config.note('Valgrind mode {}'.format('ENABLED' if valgrind_mode else 'DISABLED'))
lit_config.note('ASAN mode {}'.format('ENABLED' if asan_mode else 'DISABLED'))
lit_config.note('Optimization level: {}'.format(opt_level))
lit_config.note('Compiler: {}'.format(comp_base))
if output_prefix:
    lit_config.note('Output prefix: {}'.format(output_prefix))
if cheerp_flags:
    lit_config.note('Cheerp flags: {}'.format(cheerp_flags))

# Build the compile command for this (target, mode).
target_flags = {
    'wasm':  '-target cheerp-wasm',
    'js':    '-target cheerp',
    'asmjs': '-target cheerp-wasm -cheerp-linear-output=asmjs',
}
preexec_flags = '-DPRE_EXECUTE_TEST -cheerp-preexecute -mllvm -cheerp-preexecute-main' if mode == 'preexec' else ''

compile_cmd_parts = []
if valgrind_mode:
    compile_cmd_parts.append('valgrind -q')
compile_cmd_parts.append(comp_base)
if preexec_flags:
    compile_cmd_parts.append(preexec_flags)
if cheerp_flags:
    compile_cmd_parts.append(cheerp_flags)
compile_cmd_parts.extend([opt_level, '-frtti', '-cheerp-bounds-check', '-cheerp-fix-wrong-func-casts', '-I' + tests_dir, target_flags[target]])
if asan_mode and target in ('wasm', 'asmjs'):
    compile_cmd_parts.append('-fsanitize=address')
compile_cmd = ' '.join(compile_cmd_parts)

# Define features for test REQUIRES directives.
if not asan_mode:
    config.available_features.add('no-asan')
config.available_features.add(mode if mode == 'regular' else 'preexecution')
config.available_features.add(target)
if target in ('wasm', 'asmjs'):
    config.available_features.add('linear-memory')
if target in ('wasm', 'js'):
    config.available_features.add('packed_tests')

# COMPILE_ONLY mode: used by the determinism pass to skip test execution.
# Only the compile and driver-creation RUN lines matter for artifact diffing,
# so we short-circuit %node and %FileCheck. We can't use `true` here: when a
# RUN line pipes compiler output into `%FileCheck`, `true` exits immediately,
# closes the pipe, and the compiler gets SIGPIPE on its next diagnostic write
# — losing the -o output file. `sh -c 'cat >/dev/null'` drains stdin to EOF
# instead, keeping the upstream compiler alive; extra positional args (like
# %s) land in $0/$1 and are harmlessly ignored by the inner cat.
# These substitutions must precede the real ones below; lit applies
# substitutions in order and the first match wins for each occurrence.
compile_only_param = lit_config.params.get('COMPILE_ONLY', '0').strip().lower()
compile_only = compile_only_param in ('1', 'true', 'yes', 'on')
if compile_only:
    lit_config.note('COMPILE_ONLY mode ENABLED (node/FileCheck skipped)')
    _drain = "sh -c 'cat >/dev/null'"
    config.substitutions.append(('%FileCheck', _drain))
    config.substitutions.append(('%node', _drain))

# Substitutions
config.substitutions.append(('%FileCheck', 'FileCheck'))
config.substitutions.append(('%node', 'node'))
config.substitutions.append(('%helpers', helpers_dir))
# In preexec mode the compiler prints test output via a builtin to stderr;
# the canonical RUN line redirects 2>%t.log so %run cats it.
config.substitutions.append(('%run', 'cat %t.log' if mode == 'preexec' else 'node %t.js 2>&1'))
config.substitutions.append(('%compile', compile_cmd))
config.substitutions.append(('%target', target))

# Per-(target, mode) test_exec_root.
outputs_root = os.path.join(repo_root, 'Outputs-' + output_prefix) if output_prefix else os.path.join(repo_root, 'Outputs')
config.test_exec_root = os.path.join(outputs_root, '{}-{}'.format(target, mode))
lit_config.note('Test exec root: {}'.format(config.test_exec_root))
