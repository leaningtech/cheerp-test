import lit.formats
import os

def _param_or_env(name, default=''):
    value = lit_config.params.get(name, '').strip()
    if value:
        return value
    value = os.environ.get(name, '').strip()
    return value if value else default

tests_dir = os.path.dirname(__file__)
repo_root = os.path.abspath(os.path.join(tests_dir, '..'))
workspace_root = os.path.abspath(os.path.join(repo_root, '..', '..'))
helpers_dir = os.path.join(repo_root, 'helpers')
local_cheerp_compiler = os.path.join(workspace_root, 'cheerp-compiler', 'build', 'bin', 'clang++')
cheerp_prefix = _param_or_env('CHEERP_PREFIX', '/opt/cheerp')
output_prefix = lit_config.params.get('OUTPUT_PREFIX', '').strip()
keep_logs_param = lit_config.params.get('KEEP_LOGS', '0').strip().lower()
keep_logs = keep_logs_param in ['1', 'true', 'yes', 'on']
print_stats_param = lit_config.params.get('PRINT_STATS', '0').strip().lower()
print_stats_enabled = print_stats_param in ['1', 'true', 'yes', 'on']
time_tests_param = lit_config.params.get('TIME_TESTS', '0').strip().lower()
time_tests_enabled = time_tests_param in ['1', 'true', 'yes', 'on']
himem_param = lit_config.params.get('HIMEM', '0').strip().lower()
himem_enabled = himem_param in ['1', 'true', 'yes', 'on']

config.name = 'Cheerp-testing-suite'
config.test_source_root = tests_dir
config.test_format = lit.formats.ShTest(execute_external=True)
config.suffixes = ['.cpp', '.c']

comp_base = os.path.join(cheerp_prefix, 'bin', 'clang++')

cheerp_targets = ["js", "wasm", "asmjs"]

# Parse preexecution mode parameter
# PRE_EX=0 or empty: no preexecution
# PRE_EX=j or PRE_EX=js: js preexecution only
# PRE_EX=a or PRE_EX=asmjs: asmjs preexecution only
# PRE_EX=1 or PRE_EX=true: both js and asmjs preexecution
preex_param = lit_config.params.get('PRE_EX', '0').strip().lower()
# REG parameter for combined mode: controls whether regular mode runs
# REG=1 or REG=true (default): regular mode enabled
# REG=0 or REG=false: regular mode disabled
regular_param = lit_config.params.get('REG', '1').strip().lower()
preexecute_wasm = False
preexecute_asmjs = False
regular_mode = True  # Default to regular mode enabled

if preex_param in ['1', 'true', 'yes', 'both']:
    preexecute_wasm = True
    preexecute_asmjs = True
elif preex_param in ['j', 'wasm', 'js']:
    preexecute_wasm = True
elif preex_param in ['a', 'asmjs']:
    preexecute_asmjs = True

if regular_param in ['no', 'false', '0']:
    regular_mode = False

preexecute_mode = preexecute_wasm or preexecute_asmjs

targets_csv = lit_config.params.get("TARGET", "").strip()
cheerp_flags = lit_config.params.get('CHEERP_FLAGS', "").strip()
extra_flags = lit_config.params.get('EXTRA_FLAGS', "").strip()
opt_level = lit_config.params.get('OPT_LEVEL', 'O1').strip()
IR = lit_config.params.get('IR', "").strip()

# Ensure opt_level has proper format (-O prefix)
if not opt_level.startswith('-'):
    if not opt_level.startswith('O'):
        opt_level = '-O' + opt_level
    else:
        opt_level = '-' + opt_level
comp = lit_config.params.get('COMPILER', 'cheerp').strip()
if comp == 'cheerp':
    comp_base = os.path.join(cheerp_prefix, 'bin', 'clang++')
elif comp == 'cheerp-clang':
    comp_base = os.path.join(cheerp_prefix, 'bin', 'cheerp-clang++')
elif comp in ('cheerp alt', 'cheerp-alt', 'local', 'local-cheerp'):
    comp_base = local_cheerp_compiler
    extra_flags = (extra_flags + ' -isystem ' + os.path.join(cheerp_prefix, 'include') + ' -isystem ' + os.path.join(cheerp_prefix, 'include', 'client')).strip()
else:
    comp_base = os.path.expanduser(comp)  # Use custom compiler path

# Parse -valgrind option from cheerp_flags
valgrind_mode = False
if '-valgrind' in cheerp_flags:
    valgrind_mode = True
    # Remove -valgrind from cheerp_flags since it's not a compiler flag
    cheerp_flags = cheerp_flags.replace('-valgrind', '').strip()

asan_mode = False
if '-asan' in cheerp_flags:
    asan_mode = True
    # Remove -asan from cheerp_flags since it's not a compiler flag
    cheerp_flags = cheerp_flags.replace('-asan', '').strip()

if IR:
  extra_flags = (extra_flags + ' -mllvm -print-after-all').strip()

selected_targets = []
for t in targets_csv.split(","):
    if t.strip().lower() in cheerp_targets:
        selected_targets.append(t);
if not selected_targets:
    # Default to all targets
    selected_targets = set(cheerp_targets)
    # If ASAN is enabled, automatically exclude JS target. JS cannot work with ASAN.
    if asan_mode:
        selected_targets.discard('js')
        lit_config.warning('ASAN enabled: automatically excluding JS target (use --param TARGET="js,wasm,asmjs" to override)')

lit_config.note('Selected targets: {}'.format(selected_targets))

# print modes to terminal for clarity
if preexecute_mode:
    modes = []
    if preexecute_wasm:
        modes.append('wasm/js')
    if preexecute_asmjs:
        modes.append('asmjs')
    lit_config.note('Preexecution mode ENABLED: {}'.format(', '.join(modes)))
else:
    lit_config.note('Preexecution mode DISABLED')

if valgrind_mode:
    lit_config.note('Valgrind mode ENABLED')
else:
    lit_config.note('Valgrind mode DISABLED')

if asan_mode:
    lit_config.note("ASAN mode ENABLED (only applies to wasm/asmjs targets)")
else:
    lit_config.note("ASAN mode DISABLED")

lit_config.note('Optimization level: {}'.format(opt_level))
lit_config.note('Compiler: {}'.format(comp_base))
lit_config.note('Cheerp prefix: {}'.format(cheerp_prefix))
if output_prefix:
    lit_config.note('Output prefix: {}'.format(output_prefix))
if keep_logs:
    lit_config.note('Keep logs ENABLED')
if print_stats_enabled:
    lit_config.note('Print stats ENABLED')
if time_tests_enabled:
    lit_config.note('Per-test timing output ENABLED')
if himem_enabled:
    lit_config.note('HiMem mode ENABLED')

all_flags = ' '.join(filter(None, [cheerp_flags, extra_flags]))
cheerp_cmd = comp_base + (' ' + all_flags if all_flags else '')

# Preexecution-specific flags
preexecute_flags = '-DPRE_EXECUTE_TEST -cheerp-preexecute -mllvm -cheerp-preexecute-main'
if preexecute_mode:
    cheerp_cmd_preexec = comp_base + ' ' + preexecute_flags + (' ' + all_flags if all_flags else '')
else:
    cheerp_cmd_preexec = None

if cheerp_flags:
    lit_config.note('Cheerp flags: {}'.format(cheerp_flags))
else:
    lit_config.note('No Cheerp flags set')

if extra_flags:
    lit_config.note('Extra flags: {}'.format(extra_flags))
else:
    lit_config.note('No extra flags set')

# Define features for test REQUIRES directives
if not asan_mode:
    config.available_features.add('no-asan')
if asan_mode:
    config.available_features.add('asan')

if preexecute_mode:
    config.available_features.add('preexecution')
else:
    config.available_features.add('regular')

if "js" in selected_targets:
    config.available_features.add('js')
if "wasm" in selected_targets:
    config.available_features.add('wasm')
if "asmjs" in selected_targets:
    config.available_features.add('asmjs')
if "wasm" in selected_targets or "asmjs" in selected_targets:
    config.available_features.add('linear-memory')
if "wasm" in selected_targets or "js" in selected_targets:
    config.available_features.add('packed_tests')

if valgrind_mode:
    config.available_features.add('valgrind')
else:
    config.available_features.add('no-valgrind')

# Basic substitutions
config.substitutions.append(('%FileCheck', 'FileCheck'))
config.substitutions.append(('%node', 'node'))
config.substitutions.append(('%helpers', helpers_dir))

# NOTE: I commented out the wasm/asmjs ones for now since preexecution doesn't support them
# In regular mode: compile to file, then run with node
# In preexec mode: just compile (compiler outputs CHECK lines to stderr)

# Context-specific macros for combined mode (added first for precedence)
# These allow tests to specify which mode the execution should happen in
if preexecute_mode and regular_mode:
    # Combined mode: context-specific macros work as expected
    # Regular-mode execution macros: run with node
    config.substitutions.append(('%then_run_regular_js', '&& node %t/j'))
    config.substitutions.append(('%then_run_regular_wasm', '&& node %t/w'))
    config.substitutions.append(('%then_run_regular_asmjs', '&& node %t/a'))
    # Preexec-mode execution macros: don't run (compiler handles it)
    config.substitutions.append(('%then_run_preexec_js', ''))
    config.substitutions.append(('%then_run_preexec_asmjs', ''))
    # Generic %then_run defaults to regular mode for backward compatibility
    config.substitutions.append(('%then_run_js', '&& node %t/j'))
elif preexecute_mode:
    # Preexec-only mode: regular macros don't run, preexec macros also don't run
    config.substitutions.append(('%then_run_regular_js', ''))
    config.substitutions.append(('%then_run_regular_wasm', ''))
    config.substitutions.append(('%then_run_regular_asmjs', ''))
    config.substitutions.append(('%then_run_preexec_js', ''))
    config.substitutions.append(('%then_run_preexec_asmjs', ''))
    # Generic macro: don't run in preexec mode
    config.substitutions.append(('%then_run_js', ''))
else:
    # Regular-only mode: regular macros run, preexec macros don't exist
    config.substitutions.append(('%then_run_regular_js', '&& node %t/j'))
    config.substitutions.append(('%then_run_regular_wasm', '&& node %t/w'))
    config.substitutions.append(('%then_run_regular_asmjs', '&& node %t/a'))
    config.substitutions.append(('%then_run_preexec_js', ''))
    config.substitutions.append(('%then_run_preexec_asmjs', ''))
    # Generic macro: run with node in regular mode
    config.substitutions.append(('%then_run_js', '&& node %t/j'))

# Valgrind support - Note: valgrind is now built into compile commands
# This substitution is kept for backward compatibility or manual use
if valgrind_mode:
    config.substitutions.append(('%valgrind', 'valgrind -q'))
else:
    config.substitutions.append(('%valgrind', ''))

target_flags = {
    'wasm': '-target cheerp-wasm',
    'js': '-target cheerp',
    'asmjs': '-target cheerp-wasm -cheerp-linear-output=asmjs'
}

# Mode-specific compile macros for all targets (enabled and disabled)
# Strategy for combined mode:
# - Add context-aware patterns like 'regular_only .*compile_mode_js' first
# - These match before generic 'compile_mode_js' patterns
# - This makes compile_mode_* automatically use the right command based on line context

for target, flag in target_flags.items():
    if target in selected_targets:
        # Build command strings
        regular_cmd = cheerp_cmd
        if asan_mode and (target == 'wasm' or target == 'asmjs'):
            regular_cmd += ' -fsanitize=address'
        elif asan_mode and target == 'js':
            regular_cmd = regular_cmd.replace('-fsanitize=address', '')
        if valgrind_mode:
            regular_cmd = 'valgrind -q ' + regular_cmd
        regular_cmd_full = regular_cmd + ' ' + opt_level + ' -frtti -cheerp-bounds-check -cheerp-fix-wrong-func-casts -I' + tests_dir + ' ' + flag
        
        should_preexec = (target == 'js' and preexecute_wasm) or (target == 'asmjs' and preexecute_asmjs)
        if should_preexec and cheerp_cmd_preexec:
            preexec_cmd = cheerp_cmd_preexec
            if valgrind_mode:
                preexec_cmd = 'valgrind -q ' + preexec_cmd
            preexec_cmd_full = preexec_cmd + ' ' + opt_level + ' -frtti -cheerp-bounds-check -cheerp-fix-wrong-func-casts -I' + tests_dir + ' ' + flag
        else:
            preexec_cmd_full = 'true'
        
        # In combined mode, make compile_mode_* context-aware by matching the mode prefix
        # These patterns must be added BEFORE generic patterns so they match first
        if preexecute_mode and regular_mode:
            # Match 'regular_only ...compile_mode_js' -> use regular command
            config.substitutions.append((
                'regular_only (.*)compile_mode_' + target,
                'regular_only \\1' + regular_cmd_full
            ))
            # Match 'preexec_only ...compile_mode_js' -> use preexec command
            config.substitutions.append((
                'preexec_only (.*)compile_mode_' + target,
                'preexec_only \\1' + preexec_cmd_full
            ))
        
        # Generic compile_mode_* macro (for backward compatibility and non-combined mode)
        if preexecute_mode and not regular_mode:
            # Preexec-only mode
            config.substitutions.append(('compile_mode_' + target, preexec_cmd_full))
        else:
            # Regular mode (default)
            config.substitutions.append(('compile_mode_' + target, regular_cmd_full))
        
        # Explicit mode-specific macros for tests that want to be explicit
        if regular_mode:
            config.substitutions.append(('compile_mode_regular_' + target, regular_cmd_full))
        else:
            config.substitutions.append(('compile_mode_regular_' + target, 'true'))
        
        if should_preexec and cheerp_cmd_preexec:
            config.substitutions.append(('compile_mode_preexec_' + target, preexec_cmd_full))
        else:
            config.substitutions.append(('compile_mode_preexec_' + target, 'true'))
    else:
        # Target is disabled - replace with 'true'
        config.substitutions.append(('compile_mode_' + target, 'true'))
        config.substitutions.append(('compile_mode_regular_' + target, 'true'))
        config.substitutions.append(('compile_mode_preexec_' + target, 'true'))

# singular modes exist in order to run different modes sequentially, allowing for separated output.
# Combined mode: both regular and preexec lines can run
# IMPORTANT: These are added AFTER compile_mode_* so that compile_mode sees the mode prefix
if preexecute_mode and regular_mode:
    # Combined mode: enable both regular and preexec lines
    config.substitutions.append(('preexec_only ', ''))
    config.substitutions.append(('regular_only ', ''))
elif preexecute_mode:
    # Preexec-only mode: disable regular lines
    config.substitutions.append(('preexec_only ', ''))
    config.substitutions.append(('regular_only .*', 'true'))
else:
    # Regular-only mode: disable preexec lines
    config.substitutions.append(('regular_only ', ''))
    config.substitutions.append(('preexec_only .*', 'true'))

# Apply run_if patterns AFTER mode-specific patterns so they take precedence
for target in cheerp_targets:
    target_should_run = False
    
    if preexecute_mode:
        if target == 'js' and preexecute_wasm:
            target_should_run = True
        elif target == 'asmjs' and preexecute_asmjs:
            target_should_run = True
        # wasm never runs in preexecution mode
    
    if regular_mode:
        # Regular mode: target runs if it's in selected_targets
        if target in selected_targets:
            target_should_run = True
    
    if target_should_run:
        # Target enabled - remove the macro name (runs the command as-is)
        config.substitutions.append((
            'run_if_' + target + ' ',
            ''
        ))
    else:
        # Target disabled - replace entire line with 'true'
        config.substitutions.append((
            'run_if_' + target + '[^\n]*',
            'true'
        ))

if output_prefix:
    config.test_exec_root = os.path.join(repo_root, 'Outputs-' + output_prefix)
else:
    config.test_exec_root = os.path.join(repo_root, 'Outputs')
lit_config.note('Test exec root: {}'.format(config.test_exec_root))

# Ensure Cheerp tools (like llc for -cheerp-no-lto) are in PATH
# We need to add BOTH the compiler's directory AND the cheerp_prefix/bin directory
# because -cheerp-no-lto requires llc and opt which may be in a different location
path_components = []

# Add the compiler's bin directory (if it exists)
tool_bin_dir = os.path.dirname(comp_base)
if tool_bin_dir and os.path.isdir(tool_bin_dir):
    path_components.append(tool_bin_dir)

# Add the cheerp_prefix/bin directory (always, for llc/opt)
cheerp_bin = os.path.join(cheerp_prefix, 'bin')
if os.path.isdir(cheerp_bin) and cheerp_bin not in path_components:
    path_components.append(cheerp_bin)

# Build final PATH
if 'PATH' in os.environ:
    config.environment['PATH'] = ':'.join(path_components) + ':' + os.environ['PATH']
else:
    config.environment['PATH'] = ':'.join(path_components) + ':/usr/bin:/bin'

lit_config.note('PATH configured with: {}'.format(':'.join(path_components)))
